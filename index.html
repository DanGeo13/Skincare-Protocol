<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Protocol Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #bb86fc; --text: #ffffff; --text-muted: #a0a0a0; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 80px; }
        h1, h2, h3 { margin-top: 0; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .step { display: flex; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #333; }
        .step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .step-number { background: var(--primary); color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; flex-shrink: 0; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; cursor: pointer; }
        input[type="time"], input[type="date"] { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; background: #333; border: none; color: white; border-radius: 6px; color-scheme: dark; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; padding: 15px; border-top: 1px solid #333; }
        .nav div { flex: 1; text-align: center; color: var(--text-muted); font-weight: bold; cursor: pointer; }
        .nav .active { color: var(--primary); }
        .hidden { display: none; }
        #phase-badge { background: #333; padding: 4px 10px; border-radius: 12px; font-size: 0.8em; vertical-align: middle; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="view-routine">
        <h2>Right Now <span id="phase-badge">Loading...</span></h2>
        <p style="color: var(--text-muted); margin-top:-10px;" id="time-context">Checking time...</p>
        
        <div class="card" id="routine-container">
            </div>
        <button id="btn-complete">Mark Complete</button>
    </div>

    <div id="view-settings" class="hidden">
        <h2>App Settings</h2>
        <div class="card">
            <label>Protocol Start Date</label>
            <input type="date" id="set-start-date">
            
            <label>Morning Reminder Time</label>
            <input type="time" id="set-am-time">
            
            <label>Evening Reminder Time</label>
            <input type="time" id="set-pm-time">
            
            <label>Phase Duration (Days per phase)</label>
            <input type="number" id="set-phase-days" value="14" style="width:100%; padding:10px; margin-top:5px; margin-bottom:15px; background:#333; border:none; color:white; border-radius:6px;">

            <button id="btn-save-settings">Save & Update</button>
            <button id="btn-enable-notifs" style="background:#333; color:white; margin-top:15px;">Enable Notifications</button>
        </div>
    </div>

    <div class="nav">
        <div id="nav-routine" class="active" onclick="switchTab('routine')">Routine</div>
        <div id="nav-settings" onclick="switchTab('settings')">Settings</div>
    </div>

    <script src="protocol.js"></script>
    <script src="app.js"></script>
</body>
</html>
